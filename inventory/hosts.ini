# Single inventory for the entire vast.kubernetes collection.
#
# Hosts and per-host IPs live here. Credentials live in
# inventory/group_vars/all/vault.yml (ansible-vault encrypted).
#
# Group reference:
#   [masters]         control-plane nodes (one or more)
#   [workers]         worker nodes
#   [k8s:children]    union of masters + workers (kubeadm targets)
#   [k8s_nodes]       alias of k8s:children used by zarf inotify role
#   [csi_controller]  host that runs kubectl + helm for CSI install
#                     (usually the same as a master)
#   [nfs_targets]     hosts that mount VAST NFS PVCs (workers + sometimes masters)
#   [zarf_controller] host that runs zarf binary (usually a master)

[masters]
master ansible_host=10.143.2.26

[workers]
worker1 ansible_host=10.143.2.174

[k8s:children]
masters
workers

[k8s_nodes:children]
masters
workers

[csi_controller]
master

[nfs_targets]
worker1

[zarf_controller]
master

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
