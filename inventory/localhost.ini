# Offline test inventory — points every group at localhost via local connection
# so `--syntax-check` and `--check --diff` work without SSH or live cluster.
#
# Usage:
#   ansible-playbook -i inventory/localhost.ini playbooks/site.yml --syntax-check
#   ansible-playbook -i inventory/localhost.ini playbooks/site.yml --check --diff
#
# Not for production runs.

[masters]
master ansible_host=127.0.0.1

[workers]
worker1 ansible_host=127.0.0.1

[k8s:children]
masters
workers

[k8s_nodes:children]
masters
workers

[csi_controller]
master

[nfs_targets]
worker1

[zarf_controller]
master

[all:vars]
ansible_connection=local
ansible_python_interpreter={{ ansible_playbook_python }}
ansible_become=false
