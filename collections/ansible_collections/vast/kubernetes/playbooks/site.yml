---
# Top-level orchestrator. Run a single phase via `--tags <tag>`:
#   k8s   → bootstrap kubeadm cluster
#   csi   → install VAST CSI driver
#   zarf  → install VAST DataEngine via Zarf
#   users → provision K8s users

- name: Site | bootstrap K8s cluster
  import_playbook: k8s_cluster.yml
  tags: [k8s, site]

- name: Site | install VAST CSI driver
  import_playbook: csi.yml
  tags: [csi, site]

- name: Site | deploy VAST DataEngine via Zarf
  import_playbook: zarf.yml
  tags: [zarf, site]

- name: Site | provision K8s users
  import_playbook: users.yml
  tags: [users, site]
