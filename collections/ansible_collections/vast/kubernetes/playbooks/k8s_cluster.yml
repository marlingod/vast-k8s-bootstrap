---
# Bootstrap a kubeadm K8s cluster (containerd + Flannel CNI).
# Targets: masters, workers (defined in inventory/hosts.ini).
#
# Tag: k8s   — run via `make k8s` or `ansible-playbook ... --tags k8s`.

- name: K8s | install ClusterShell on all nodes
  hosts: all
  become: true
  gather_facts: true
  tags: [k8s, k8s_prereqs]
  roles:
    - vast.kubernetes.common_prereqs
    - vast.kubernetes.clustershell

- name: K8s | install kubeadm prerequisites
  hosts: k8s
  become: true
  gather_facts: false                          # facts cached from play #1
  tags: [k8s, k8s_prereqs]
  roles:
    # common_prereqs intentionally omitted — already ran on `all` (superset)
    - vast.kubernetes.containerd
    - vast.kubernetes.kubeadm_install
    - vast.kubernetes.nfs_client
    - vast.kubernetes.firewall_k8s

- name: K8s | initialize master(s)
  hosts: masters
  become: true
  gather_facts: true                           # python_k8s_client needs ansible_os_family
  tags: [k8s, k8s_master]
  module_defaults:
    group/k8s:
      kubeconfig: /etc/kubernetes/admin.conf
  roles:
    - vast.kubernetes.python_k8s_client       # required by kubeadm_master's Flannel install
    - vast.kubernetes.kubeadm_master

- name: K8s | join worker(s)
  hosts: workers
  become: true
  gather_facts: false                          # no facts referenced
  tags: [k8s, k8s_worker]
  roles:
    - vast.kubernetes.kubeadm_worker
