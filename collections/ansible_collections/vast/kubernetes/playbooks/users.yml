---
# Provision K8s users (RBAC + tokens or client certs) via the k8s_users role.
# Tag: users
#
# Drive with a `users:` list in inventory/group_vars/all/vars.yml or via -e:
#   ansible-playbook playbooks/users.yml -e '{"users":[{"name":"alice","auth":"cert"}]}'

- name: Users | provision K8s users
  hosts: masters
  become: true
  gather_facts: true                          # python_k8s_client needs os_family
  tags: [users]
  module_defaults:
    group/k8s:
      kubeconfig: "{{ k8s_users_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
  pre_tasks:
    - name: Stat admin.conf
      ansible.builtin.stat:
        path: "{{ k8s_users_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
      register: _users_kubeconfig_stat
    - name: Note — no kubeconfig present, Users play will skip (check mode)
      ansible.builtin.debug:
        msg: |
          [check mode] admin.conf is missing. A real `make site` run would
          provision the K8s users defined under `users:` in vars.yml
          (SA + token or CSR-based X.509 cert + ClusterRoleBinding).
      when:
        - ansible_check_mode | bool
        - not _users_kubeconfig_stat.stat.exists
    - name: End Users play — no kubeconfig (check mode on fresh cluster)
      ansible.builtin.meta: end_play
      when:
        - ansible_check_mode | bool
        - not _users_kubeconfig_stat.stat.exists
  roles:
    - vast.kubernetes.python_k8s_client
    - vast.kubernetes.k8s_users
