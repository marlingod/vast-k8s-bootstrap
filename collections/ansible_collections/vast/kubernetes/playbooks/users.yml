---
# Provision K8s users (RBAC + tokens or client certs) via the k8s_users role.
# Tag: users
#
# Drive with a `users:` list in inventory/group_vars/all/vars.yml or via -e:
#   ansible-playbook playbooks/users.yml -e '{"users":[{"name":"alice","auth":"cert"}]}'

- name: Users | provision K8s users
  hosts: masters
  become: true
  gather_facts: false
  tags: [users]
  module_defaults:
    group/k8s:
      kubeconfig: "{{ k8s_users_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
  roles:
    - vast.kubernetes.k8s_users
