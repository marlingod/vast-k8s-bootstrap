---
# Air-gapped VAST DataEngine deployment via Zarf. Assumes a running K8s
# cluster. If using the VAST CSI driver as the default StorageClass, run
# csi.yml first.
# Tag: zarf

- name: Zarf | tune inotify on every K8s node
  hosts: k8s_nodes
  become: true
  gather_facts: false
  strategy: free                              # nodes are independent
  tags: [zarf, zarf_inotify]
  roles:
    - vast.kubernetes.inotify_limits

- name: Zarf | install CLI, fetch packages, deploy DataEngine
  hosts: zarf_controller
  become: true
  gather_facts: true                          # python_k8s_client needs os_family
  tags: [zarf]
  module_defaults:
    group/k8s:
      kubeconfig: "{{ sc_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
  pre_tasks:
    - name: Stat admin.conf
      ansible.builtin.stat:
        path: "{{ sc_kubeconfig | default('/etc/kubernetes/admin.conf') }}"
      register: _zarf_kubeconfig_stat
    - name: Note — no kubeconfig present, Zarf play will skip (check mode)
      ansible.builtin.debug:
        msg: |
          [check mode] admin.conf is missing. A real `make site` run would
          install the zarf CLI, scp/fetch the SE-provided .tar.zst packages,
          ensure a default StorageClass, pre-install knative-operator CRDs,
          run `zarf init`, create vast_namespaces, and `zarf package deploy`
          the DataEngine.
      when:
        - ansible_check_mode | bool
        - not _zarf_kubeconfig_stat.stat.exists
    - name: End Zarf play — no kubeconfig (check mode on fresh cluster)
      ansible.builtin.meta: end_play
      when:
        - ansible_check_mode | bool
        - not _zarf_kubeconfig_stat.stat.exists
  roles:
    - vast.kubernetes.python_k8s_client
    - vast.kubernetes.zarf_install
    - vast.kubernetes.zarf_packages
    - vast.kubernetes.storage_class
    - vast.kubernetes.knative_crds
    - vast.kubernetes.dataengine_deploy
