---
# VAST Zarf package (knative + KEDA + operator + telemetry collector × 5)
# blows past kernel inotify defaults; pods CrashLoopBackOff at startup without
# this. Idempotent: writes /etc/sysctl.d/99-vast-inotify.conf.

- name: Set fs.inotify.max_user_instances
  ansible.posix.sysctl:
    name: fs.inotify.max_user_instances
    value: "{{ inotify_max_user_instances }}"
    sysctl_file: /etc/sysctl.d/99-vast-inotify.conf
    state: present
    reload: true

- name: Set fs.inotify.max_user_watches
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "{{ inotify_max_user_watches }}"
    sysctl_file: /etc/sysctl.d/99-vast-inotify.conf
    state: present
    reload: true
