---
# Install Helm 3 on the controller host. Idempotent via `creates:` guard.

- name: Check kubectl is on PATH
  ansible.builtin.command: command -v kubectl
  changed_when: false

- name: Check kubectl can reach the cluster
  ansible.builtin.command: kubectl cluster-info
  environment:
    KUBECONFIG: "{{ helm_kubeconfig }}"
  changed_when: false

- name: Check for existing helm
  ansible.builtin.command: command -v helm
  register: helm_check
  failed_when: false
  changed_when: false

- name: Download Helm tarball
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-{{ helm_arch }}.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}.tar.gz"
    mode: '0644'
    timeout: 120
  when: helm_check.rc != 0

- name: Extract Helm tarball
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
    creates: "/tmp/linux-{{ helm_arch }}/helm"
  when: helm_check.rc != 0

- name: Install Helm binary
  ansible.builtin.copy:
    src: "/tmp/linux-{{ helm_arch }}/helm"
    dest: "{{ helm_install_dir }}/helm"
    mode: '0755'
    remote_src: true
  become: true
  when: helm_check.rc != 0

- name: Verify Helm version
  ansible.builtin.command: helm version --short
  register: helm_version_out
  changed_when: false

- name: Helm version
  ansible.builtin.debug:
    msg: "{{ helm_version_out.stdout }}"
