---
# Install the Zarf CLI on the controller host. Skip when zarf_detect_existing
# is true and a zarf binary is already on PATH.

- name: Check for existing zarf binary
  ansible.builtin.command: command -v zarf
  register: zarf_check
  failed_when: false
  changed_when: false

- name: Skip — zarf already installed
  ansible.builtin.debug:
    msg: "zarf already at {{ zarf_check.stdout }} — skipping (zarf_detect_existing=true)"
  when: zarf_check.rc == 0 and (zarf_detect_existing | bool)

- name: Download Zarf release binary
  ansible.builtin.get_url:
    url: "https://github.com/zarf-dev/zarf/releases/download/{{ zarf_version }}/zarf_{{ zarf_version }}_Linux_{{ zarf_arch }}"
    dest: "/tmp/zarf_{{ zarf_version }}_{{ zarf_arch }}"
    mode: '0755'
    timeout: 120
  when: zarf_check.rc != 0 or not (zarf_detect_existing | bool)

- name: Install Zarf binary
  ansible.builtin.copy:
    src: "/tmp/zarf_{{ zarf_version }}_{{ zarf_arch }}"
    dest: "{{ zarf_install_dir }}/zarf"
    mode: '0755'
    remote_src: true
  become: true
  when: zarf_check.rc != 0 or not (zarf_detect_existing | bool)

- name: Verify zarf version
  ansible.builtin.command: zarf version
  register: zarf_version_out
  changed_when: false

- name: Zarf version
  ansible.builtin.debug:
    msg: "{{ zarf_version_out.stdout }}"
