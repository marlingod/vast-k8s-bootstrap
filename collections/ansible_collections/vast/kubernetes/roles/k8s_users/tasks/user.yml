---

- name: "Validate auth mode for {{ user.name }}"
  ansible.builtin.fail:
    msg: "user.auth must be 'token' or 'cert', got '{{ user.auth | default('') }}'"
  when: user.auth not in ['token', 'cert']

# ── token branch ────────────────────────────────────────────────────────

- name: "Create ServiceAccount for {{ user.name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ user.name }}"
        namespace: "{{ user.namespace | default('kube-system') }}"
  when: user.auth == 'token'

- name: "Create SA token Secret for {{ user.name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      type: kubernetes.io/service-account-token
      metadata:
        name: "{{ user.name }}-token"
        namespace: "{{ user.namespace | default('kube-system') }}"
        annotations:
          kubernetes.io/service-account.name: "{{ user.name }}"
  when: user.auth == 'token'

- name: "Create ClusterRoleBinding (token) for {{ user.name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "{{ user.name }}-{{ user.role | default('cluster-admin') }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ user.role | default('cluster-admin') }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ user.name }}"
          namespace: "{{ user.namespace | default('kube-system') }}"
  when: user.auth == 'token'

- name: "Wait for SA token Secret to populate for {{ user.name }}"
  kubernetes.core.k8s_info:
    kind: Secret
    name: "{{ user.name }}-token"
    namespace: "{{ user.namespace | default('kube-system') }}"
  register: sa_secret
  retries: 5
  delay: 2
  until:
    - sa_secret.resources | length > 0
    - sa_secret.resources[0].data.token is defined
  when: user.auth == 'token'
  no_log: true

# ── cert branch ─────────────────────────────────────────────────────────
# Per-user layout on the controller (this Mac):
#
#   {{ k8s_users_output_dir }}/{{ user.name }}-certs/
#     ├── client.key   0600   private key — never leaves this Mac
#     ├── client.csr   0600
#     ├── client.pem   0644   signed cert (decoded from K8s response)
#     └── ca.pem       0644   cluster CA  (decoded from admin.conf)
#
# Followed by {{ k8s_users_output_dir }}/{{ user.name }}.yaml (the kubeconfig).

- name: "Ensure per-user certs dir exists for {{ user.name }}"
  ansible.builtin.file:
    path: "{{ k8s_users_output_dir }}/{{ user.name }}-certs"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false
  when: user.auth == 'cert'

- name: "Generate private key for {{ user.name }}"
  community.crypto.openssl_privatekey:
    path: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/client.key"
    size: 2048
    mode: '0600'
  delegate_to: localhost
  become: false
  when: user.auth == 'cert'

- name: "Build CSR for {{ user.name }}"
  community.crypto.openssl_csr:
    path: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/client.csr"
    privatekey_path: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/client.key"
    common_name: "{{ user.name }}"
    organization_name: "{{ user.group | default(omit) }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  when: user.auth == 'cert'

- name: "Read CSR for K8s submission for {{ user.name }}"
  ansible.builtin.slurp:
    src: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/client.csr"
  register: csr_blob
  delegate_to: localhost
  become: false
  when: user.auth == 'cert'

- name: "Delete stale K8s CSR for {{ user.name }}"
  kubernetes.core.k8s:
    state: absent
    kind: CertificateSigningRequest
    name: "{{ user.name }}-csr"
  when: user.auth == 'cert'

- name: "Submit K8s CSR for {{ user.name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: certificates.k8s.io/v1
      kind: CertificateSigningRequest
      metadata:
        name: "{{ user.name }}-csr"
      spec:
        request: "{{ csr_blob.content }}"
        signerName: kubernetes.io/kube-apiserver-client
        expirationSeconds: "{{ (user.cert_days | default(365)) * 24 * 3600 }}"
        usages: ["client auth"]
  when: user.auth == 'cert'

- name: "Approve K8s CSR for {{ user.name }}"
  ansible.builtin.command: "kubectl certificate approve {{ user.name }}-csr"
  environment:
    KUBECONFIG: "{{ k8s_users_kubeconfig }}"
  changed_when: true
  when: user.auth == 'cert'

- name: "Wait for signed cert for {{ user.name }}"
  kubernetes.core.k8s_info:
    kind: CertificateSigningRequest
    name: "{{ user.name }}-csr"
  register: csr_signed
  retries: 10
  delay: 2
  until:
    - csr_signed.resources | length > 0
    - csr_signed.resources[0].status.certificate is defined
  when: user.auth == 'cert'

- name: "Create ClusterRoleBinding (cert) for {{ user.name }}"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: "{{ user.name }}-{{ user.role | default('cluster-admin') }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: "{{ user.role | default('cluster-admin') }}"
      subjects:
        - kind: User
          name: "{{ user.name }}"
          apiGroup: rbac.authorization.k8s.io
  when: user.auth == 'cert'

# ── emit kubeconfig (both branches) ─────────────────────────────────────

- name: "Read cluster CA from admin.conf for {{ user.name }}"
  ansible.builtin.shell: |
    set -o pipefail
    grep certificate-authority-data {{ k8s_users_kubeconfig }} | awk '{print $2}'
  args:
    executable: /bin/bash
  register: cluster_ca_b64
  changed_when: false
  no_log: true

- name: "Write client.pem to certs dir for {{ user.name }}"
  ansible.builtin.copy:
    content: "{{ csr_signed.resources[0].status.certificate | b64decode }}"
    dest: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/client.pem"
    mode: '0644'
  delegate_to: localhost
  become: false
  no_log: true
  when: user.auth == 'cert'

- name: "Write ca.pem to certs dir for {{ user.name }}"
  ansible.builtin.copy:
    content: "{{ cluster_ca_b64.stdout | b64decode }}"
    dest: "{{ k8s_users_output_dir }}/{{ user.name }}-certs/ca.pem"
    mode: '0644'
  delegate_to: localhost
  become: false
  no_log: true
  when: user.auth == 'cert'

- name: "Ensure kubeconfig parent dir exists for {{ user.name }}"
  ansible.builtin.file:
    path: "{{ k8s_users_output_dir }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: "Write kubeconfig for {{ user.name }}"
  ansible.builtin.template:
    src: kubeconfig.yaml.j2
    dest: "{{ k8s_users_output_dir }}/{{ user.name }}.yaml"
    mode: '0600'
  delegate_to: localhost
  no_log: true
  vars:
    _cluster_name: "{{ user.cluster_name | default('vastde-cluster') }}"
    _ca_data: "{{ cluster_ca_b64.stdout }}"
    _api_endpoint: "{{ user.api_endpoint | default('https://' + hostvars[inventory_hostname].ansible_host + ':6443') }}"
    _token: "{{ (sa_secret.resources[0].data.token | b64decode) if user.auth == 'token' else '' }}"
    _client_cert: "{{ csr_signed.resources[0].status.certificate if user.auth == 'cert' else '' }}"
    _client_key: "{{ lookup('file', k8s_users_output_dir + '/' + user.name + '-certs/client.key') | b64encode if user.auth == 'cert' else '' }}"
