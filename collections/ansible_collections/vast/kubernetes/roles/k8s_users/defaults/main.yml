---
k8s_users_kubeconfig: /etc/kubernetes/admin.conf

# Where the per-user kubeconfig + cert artifacts land on the operator's
# laptop. Defaults to ~/.kube so files drop in next to your normal kube
# tooling and are picked up by `kubectl --kubeconfig`.
#
# Per-user layout (cert auth):
#   {{ k8s_users_output_dir }}/<name>-certs/client.key   0600  (NEVER leaves this Mac)
#   {{ k8s_users_output_dir }}/<name>-certs/client.csr   0600
#   {{ k8s_users_output_dir }}/<name>-certs/client.pem   0644
#   {{ k8s_users_output_dir }}/<name>-certs/ca.pem       0644
#   {{ k8s_users_output_dir }}/<name>.yaml               0600  (the kubeconfig)
#
# Per-user layout (token auth):
#   {{ k8s_users_output_dir }}/<name>.yaml               0600  (kubeconfig only)
k8s_users_output_dir: "{{ lookup('env', 'HOME') }}/.kube"
users: []
# Schema for each entry of `users:`
#   - name: alice              # K8s identity / SA name
#     auth: cert               # cert | token
#     role: cluster-admin      # ClusterRole to bind
#     namespace: kube-system   # only for token auth (SA namespace)
#     group: ""                # optional cert O= field
#     cert_days: 365           # cert validity (cert auth)
#     cluster_name: ca-tenant-k8s
#     api_endpoint: https://10.143.2.26:6443
