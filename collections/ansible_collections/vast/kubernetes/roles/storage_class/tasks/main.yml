---
# Ensure a default StorageClass exists. `zarf init` hangs ~15min waiting on
# the seed-registry PVC if none is present. Four provisioner branches:
#   local-path → install rancher local-path-provisioner + mark default
#   vast-csi   → no-op (csidriver module already did the work)
#   byo        → verify the named class exists; mark default if none yet
#   none       → fail-fast if no default exists

- name: Validate storage.provisioner
  ansible.builtin.fail:
    msg: "storage.provisioner={{ storage.provisioner }} is invalid. Use: local-path | vast-csi | byo | none."
  when: storage.provisioner not in ['local-path', 'vast-csi', 'byo', 'none']

- name: Detect existing default StorageClass
  kubernetes.core.k8s_info:
    kind: StorageClass
  register: all_sc

- name: Compute default StorageClass name (if any)
  # Pure Jinja2: iterate resources, look at each annotations dict via .get()
  # (which handles the dotted annotation key correctly), accumulate names of
  # classes whose annotation == 'true', return first or empty.
  ansible.builtin.set_fact:
    default_sc_name: >-
      {%- set names = [] -%}
      {%- for sc in all_sc.resources -%}
        {%- if (sc.metadata.annotations | default({})).get(_annot_key) == 'true' -%}
          {{- names.append(sc.metadata.name) or '' -}}
        {%- endif -%}
      {%- endfor -%}
      {{ names | first | default('') }}
  vars:
    _annot_key: storageclass.kubernetes.io/is-default-class

- name: Skip — default StorageClass already exists
  ansible.builtin.debug:
    msg: "Default StorageClass present: '{{ default_sc_name }}' — skipping (storage.detect=true)"
  when:
    - default_sc_name | length > 0
    - storage.detect | bool

- name: Fail — provisioner=none and no default exists
  ansible.builtin.fail:
    msg: "No default StorageClass and storage.provisioner=none. `zarf init` will hang."
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'none'

# ── provisioner=local-path ───────────────────────────────────────────────

- name: Apply local-path provisioner manifest (source=local)
  # See note in knative_crds role: kubernetes.core.k8s runs on the master,
  # so src: would look on the master for a Mac-side path. Use definition:
  # with lookup('file', ...) which reads on the controller and ships the
  # parsed YAML to the module as a literal arg.
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', role_path + '/files/' + storage.local_path.manifest_path) | from_yaml_all | list }}"
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'local-path'
    - storage.local_path.source == 'local'

- name: Apply local-path manifest from upstream GitHub (source=download)
  kubernetes.core.k8s:
    state: present
    src: "{{ storage.local_path.release_url | replace('{version}', storage.local_path.version) }}"
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'local-path'
    - storage.local_path.source == 'download'

- name: Wait for local-path provisioner Deployment ready
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: local-path-storage
    name: local-path-provisioner
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'local-path'

- name: Mark local-path StorageClass as default
  kubernetes.core.k8s:
    state: patched
    kind: StorageClass
    name: "{{ storage.class_name }}"
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'local-path'

# ── provisioner=byo ───────────────────────────────────────────────────────

- name: Verify named StorageClass exists (provisioner=byo)
  ansible.builtin.assert:
    that:
      - storage.class_name in (all_sc.resources | map(attribute='metadata.name') | list)
    fail_msg: |
      StorageClass "{{ storage.class_name }}" not found in the cluster.

      Cluster currently has these StorageClasses:
        {{ (all_sc.resources | map(attribute='metadata.name') | list) | default(['(none)']) | join(', ') }}

      Your vars.yml defines these CSI StorageClasses (storage_classes:):
        {{ storage_classes.keys() | list | join(', ') }}

      Likely fixes:
        1. Run `make csi` first — it installs the VAST CSI driver and
           creates the classes listed under storage_classes:. After that,
           {{ storage_classes.keys() | list | join(' / ') }} will exist on the cluster.
        2. Edit storage.class_name in inventory/group_vars/all/vars.yml so
           it matches one of the existing classes
           (e.g. storage.class_name: "{{ storage_classes.keys() | list | first | default('<your-class>') }}").
        3. Set storage.provisioner: vast-csi to skip the check entirely —
           use this if a default StorageClass is already in place from
           somewhere else.
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'byo'

- name: Mark named StorageClass as default (provisioner=byo)
  kubernetes.core.k8s:
    state: patched
    kind: StorageClass
    name: "{{ storage.class_name }}"
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'byo'

# ── provisioner=vast-csi ─────────────────────────────────────────────────

- name: No-op — csidriver module owns StorageClass (provisioner=vast-csi)
  ansible.builtin.debug:
    msg: "provisioner=vast-csi — relying on csi.yml to have installed a default class."
  when:
    - default_sc_name | length == 0
    - storage.provisioner == 'vast-csi'

# ── final verify ─────────────────────────────────────────────────────────

- name: Re-check default StorageClass
  kubernetes.core.k8s_info:
    kind: StorageClass
  register: all_sc_final

- name: Assert a default StorageClass is now present
  ansible.builtin.assert:
    that:
      - _has_default | bool
    fail_msg: "No default StorageClass present after storage_class role ran."
  vars:
    _annot_key: storageclass.kubernetes.io/is-default-class
    _has_default: >-
      {%- set found = namespace(any=false) -%}
      {%- for sc in all_sc_final.resources -%}
        {%- if (sc.metadata.annotations | default({})).get(_annot_key) == 'true' -%}
          {%- set found.any = true -%}
        {%- endif -%}
      {%- endfor -%}
      {{ found.any }}
