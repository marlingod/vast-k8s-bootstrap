---
# Install VAST CSI driver via Helm. Renders the values.yaml.j2 template
# (carries the per-cluster storage_classes dict) before deploy.

- name: Create CSI namespace
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ csi_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ csi_namespace }}"

- name: Validate VMS auth is provided
  ansible.builtin.fail:
    msg: "Set either vault_vms_token, or both vault_vms_username + vault_vms_password, in vault.yml"
  when:
    - (vms_token | length == 0)
    - (vms_username | length == 0) or (vms_password | length == 0)

- name: Build VMS secret data (token branch)
  ansible.builtin.set_fact:
    _csi_secret_data:
      endpoint: "{{ vms_endpoint }}"
      token: "{{ vms_token }}"
  when: vms_token | length > 0
  no_log: true

- name: Build VMS secret data (user/pass branch)
  ansible.builtin.set_fact:
    _csi_secret_data:
      endpoint: "{{ vms_endpoint }}"
      username: "{{ vms_username }}"
      password: "{{ vms_password }}"
  when: vms_token | length == 0
  no_log: true

- name: Add tenant to secret data (if configured)
  ansible.builtin.set_fact:
    _csi_secret_data: "{{ _csi_secret_data | combine({'tenant': vms_tenant}) }}"
  when: vms_tenant | length > 0
  no_log: true

- name: Create / update VMS secret
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ csi_kubeconfig }}"
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ vast_secret_name }}"
        namespace: "{{ csi_namespace }}"
      type: Opaque
      stringData: "{{ _csi_secret_data }}"
  no_log: true

- name: Render values.yaml from template
  ansible.builtin.template:
    src: values.yaml.j2
    dest: /tmp/vast-csi-values.rendered.yaml
    mode: '0600'

- name: Add VAST CSI Helm repo
  kubernetes.core.helm_repository:
    name: "{{ vast_csi_helm_repo_name }}"
    repo_url: "{{ vast_csi_helm_repo_url }}"

- name: Install / upgrade VAST CSI Driver
  kubernetes.core.helm:
    name: "{{ csi_release_name }}"
    chart_ref: "{{ vast_csi_helm_repo_name }}/{{ vast_csi_chart_name }}"
    chart_version: "{{ vast_csi_chart_version | default(omit, true) }}"
    release_namespace: "{{ csi_namespace }}"
    create_namespace: true
    kubeconfig: "{{ csi_kubeconfig }}"
    values_files:
      - /tmp/vast-csi-values.rendered.yaml
    wait: true
