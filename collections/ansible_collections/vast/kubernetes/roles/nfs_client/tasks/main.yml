---
# NFS client tools must be on the host OS for any pod (including the VAST CSI
# driver) to mount NFS PVCs. Missing nfs-common is the #1 cause of "PVC mount
# timeout" in mixed-distro fleets.

- name: Install NFS client package
  ansible.builtin.package:
    name: "{{ 'nfs-common' if ansible_os_family == 'Debian' else 'nfs-utils' }}"
    state: present

- name: Verify mount.nfs is on PATH
  # mount.nfs lives at different paths across distros:
  #   Ubuntu Noble (24.04): /usr/sbin/mount.nfs
  #   older Debian/Ubuntu:  /sbin/mount.nfs  (often a symlink to /usr/sbin)
  #   RHEL/CentOS:          /usr/sbin/mount.nfs
  # Use the shell module (NOT command — `command` is a shell builtin and
  # ansible.builtin.command can't exec builtins) so `command -v` finds it
  # wherever it lives.
  ansible.builtin.shell: command -v mount.nfs
  args:
    executable: /bin/bash
  register: mount_nfs_check
  changed_when: false
  failed_when: mount_nfs_check.rc != 0
