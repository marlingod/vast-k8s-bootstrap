---
# NFS client tools must be on the host OS for any pod (including the VAST CSI
# driver) to mount NFS PVCs. Missing nfs-common is the #1 cause of "PVC mount
# timeout" in mixed-distro fleets.

- name: Install NFS client package
  ansible.builtin.package:
    name: "{{ 'nfs-common' if ansible_os_family == 'Debian' else 'nfs-utils' }}"
    state: present

- name: Verify mount.nfs is present
  # Don't use `command -v` — `command` is a shell builtin, not a binary,
  # so ansible.builtin.command can't exec it. Stat the canonical path instead.
  ansible.builtin.stat:
    path: /sbin/mount.nfs
  register: mount_nfs_stat
  failed_when: not mount_nfs_stat.stat.exists
