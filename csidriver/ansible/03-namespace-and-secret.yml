---
# Create the CSI namespace and the vast-csi-secret consumed by values.yaml.
# Branches on what's set in group_vars: vms_token (preferred) or username+password.

- name: Create namespace and VMS secret
  hosts: csi_controller
  gather_facts: no

  tasks:
    - name: Create namespace
      ansible.builtin.command:
        cmd: "kubectl create namespace {{ csi_namespace }}"
      register: ns_create
      failed_when: ns_create.rc != 0 and 'AlreadyExists' not in ns_create.stderr
      changed_when: ns_create.rc == 0

    - name: Fail if no auth set
      ansible.builtin.fail:
        msg: "Set either vms_token, or both vms_username and vms_password, in group_vars/all.yml"
      when:
        - vms_token | length == 0
        - (vms_username | length == 0) or (vms_password | length == 0)

    - name: Delete existing secret (for idempotent re-run)
      ansible.builtin.command:
        cmd: "kubectl -n {{ csi_namespace }} delete secret {{ vast_secret_name }} --ignore-not-found"
      changed_when: false

    - name: Create secret (API token branch)
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - "{{ csi_namespace }}"
          - create
          - secret
          - generic
          - "{{ vast_secret_name }}"
          - "--from-literal=endpoint={{ vms_endpoint }}"
          - "--from-literal=token={{ vms_token }}"
      when: vms_token | length > 0
      no_log: true

    - name: Patch tenant into secret (token branch, if set)
      ansible.builtin.command:
        cmd: >
          kubectl -n {{ csi_namespace }} patch secret {{ vast_secret_name }}
          --type=merge -p '{"stringData":{"tenant":"{{ vms_tenant }}"}}'
      when:
        - vms_token | length > 0
        - vms_tenant | length > 0
      no_log: true

    - name: Create secret (username/password branch)
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - "{{ csi_namespace }}"
          - create
          - secret
          - generic
          - "{{ vast_secret_name }}"
          - "--from-literal=endpoint={{ vms_endpoint }}"
          - "--from-literal=username={{ vms_username }}"
          - "--from-literal=password={{ vms_password }}"
      when:
        - vms_token | length == 0
        - vms_username | length > 0
        - vms_password | length > 0
      no_log: true

    - name: Patch tenant into secret (user/pass branch, if set)
      ansible.builtin.command:
        cmd: >
          kubectl -n {{ csi_namespace }} patch secret {{ vast_secret_name }}
          --type=merge -p '{"stringData":{"tenant":"{{ vms_tenant }}"}}'
      when:
        - vms_token | length == 0
        - vms_tenant | length > 0
      no_log: true
