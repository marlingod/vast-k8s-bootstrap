# Inventory for VAST CSI Driver install.
#
# Hosts and per-host SSH users live here. Passwords do NOT — they live in
# group_vars/all.yml (gitignored). See ansible_password / ansible_become_password
# in group_vars/all.yml.example.
#
# Two groups:
#   [csi_controller] — host where kubectl + helm run (plays 01–05 target this).
#                      Default: master via SSH. To run locally instead, comment
#                      out the master line and uncomment the localhost line.
#   [nfs_targets]    — hosts where nfs-utils must be installed (play 00 only).
#                      List every node that may mount a VAST PVC.

[csi_controller]
master ansible_host=10.143.2.26 ansible_user=vastdata
# localhost ansible_connection=local

[nfs_targets]
worker1 ansible_host=10.143.2.174   ansible_user=vastdata
# Add more nodes as needed. Include master only if workloads schedule there:
# master  ansible_host=10.143.2.247 ansible_user=vastdata
# worker2 ansible_host=10.143.2.99  ansible_user=root

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
