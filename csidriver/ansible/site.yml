---
# Master playbook — imports each numbered step in order.
#
# Usage:
#   cd ansible
#   ansible-playbook -i inventory.ini site.yml
#
# Re-run a single step:
#   ansible-playbook -i inventory.ini 03-namespace-and-secret.yml
#
# Smoke-test (opt-in, not in site.yml):
#   ansible-playbook -i inventory.ini 05-verify.yml

- import_playbook: 00-nfs-client.yml
- import_playbook: 01-helm.yml
- import_playbook: 02-snapshot-crds.yml
- import_playbook: 03-namespace-and-secret.yml
- import_playbook: 04-install-csi.yml
