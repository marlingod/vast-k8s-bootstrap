---
# Install external-snapshotter CRDs + snapshot-controller (PDF page 38).
# kubectl apply is idempotent, so re-runs are safe.

- name: Install VolumeSnapshot CRDs
  hosts: csi_controller
  gather_facts: no

  vars:
    snapshot_base: "https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/{{ snapshot_crds_version }}"
    snapshot_manifests:
      - "{{ snapshot_base }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotclasses.yaml"
      - "{{ snapshot_base }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshotcontents.yaml"
      - "{{ snapshot_base }}/client/config/crd/snapshot.storage.k8s.io_volumesnapshots.yaml"
      - "{{ snapshot_base }}/deploy/kubernetes/snapshot-controller/rbac-snapshot-controller.yaml"
      - "{{ snapshot_base }}/deploy/kubernetes/snapshot-controller/setup-snapshot-controller.yaml"

  tasks:
    - name: Skip if install_snapshot_crds is false
      ansible.builtin.debug:
        msg: "install_snapshot_crds is false — skipping."
      when: not install_snapshot_crds

    - name: Apply snapshot manifests
      ansible.builtin.command:
        cmd: "kubectl apply -f {{ item }}"
      loop: "{{ snapshot_manifests }}"
      register: apply_result
      changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"
      when: install_snapshot_crds
