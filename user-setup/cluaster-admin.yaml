apiVersion: rbac.authorization.k8s.io/v1                                       
kind: ClusterRoleBinding                                                       
metadata:                                                                                                                                                            
  name: de-cluster-admin    # convention: <user>-<role>                                                                                                          
roleRef:                                                                                                                                                             
  apiGroup: rbac.authorization.k8s.io                                                                                                                                
  kind: ClusterRole                                                                                                                                                
  name: cluster-admin           # what permissions to grant                                                                                                          
subjects:                                                                                                                                                          
- kind: ServiceAccount          # who gets the permissions                     
  name: de-admin                                                       
  namespace: kube-system   