apiVersion: v1                                                                                                                                                       
kind: Secret                                                                
metadata:                                                                                                                                                            
  name: de-admin-token                                                                                                                                        
  namespace: kube-system                                                                                                                                             
  annotations:                                                                                                                                                     
    kubernetes.io/service-account.name: de-admin    # ← magic: must match SA name                                                                               
type: kubernetes.io/service-account-token                # ← must be this exact type     