---
# Template ClusterRoleBinding binding cluster-admin to a ServiceAccount.
# Edit `name` + `subjects[].name` to match the SA you created with sa.yaml.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: de-cluster-admin   # convention: <user>-<role>
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin      # what permissions to grant
subjects:
  - kind: ServiceAccount
    name: de-admin         # who gets the permissions
    namespace: kube-system
