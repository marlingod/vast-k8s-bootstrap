---
# Master Playbook: Complete Kubernetes Cluster Setup
# Usage: ansible-playbook -i inventory.ini site.yml
#
# This playbook will:
# 1. Install ClusterShell (clush) on all nodes
# 2. Install Kubernetes prerequisites (containerd, kubeadm, kubelet, kubectl)
# 3. Initialize the master node
# 4. Join worker nodes to the cluster

- name: Step 1 - Install ClusterShell
  import_playbook: 01-install-clush.yml

- name: Step 2 - Install Kubernetes Prerequisites
  import_playbook: 02-k8s-prerequisites.yml

- name: Step 3 - Initialize Master Node
  import_playbook: 03-k8s-master-init.yml

- name: Step 4 - Join Worker Nodes
  import_playbook: 04-k8s-worker-join.yml
