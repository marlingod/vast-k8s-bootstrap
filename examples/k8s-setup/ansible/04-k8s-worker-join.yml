---
# Playbook: Join Worker Nodes to Kubernetes Cluster
# Usage: ansible-playbook -i inventory.ini 04-k8s-worker-join.yml

- name: Join Worker Nodes to Kubernetes Cluster
  hosts: workers
  become: yes
  gather_facts: yes

  tasks:
    - name: Check if node is already joined
      stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf

    - name: Copy join command from local
      copy:
        src: ./k8s-join-command.sh
        dest: /tmp/k8s-join-command.sh
        mode: '0700'
      when: not kubelet_conf.stat.exists

    - name: Read join command
      slurp:
        src: /tmp/k8s-join-command.sh
      register: join_command_content
      when: not kubelet_conf.stat.exists

    - name: Join worker to cluster
      command: "{{ join_command_content.content | b64decode }}"
      register: join_result
      when: not kubelet_conf.stat.exists

    - name: Display join result
      debug:
        msg: "{{ join_result.stdout_lines }}"
      when: join_result is changed

    - name: Clean up join command file
      file:
        path: /tmp/k8s-join-command.sh
        state: absent

- name: Verify cluster status from master
  hosts: masters
  become: yes
  gather_facts: no

  tasks:
    - name: Wait for worker nodes to be ready
      become_user: "{{ ansible_user }}"
      command: kubectl wait --for=condition=ready node --all --timeout=300s
      register: nodes_ready
      retries: 10
      delay: 15
      until: nodes_ready.rc == 0

    - name: Get final cluster status
      become_user: "{{ ansible_user }}"
      command: kubectl get nodes -o wide
      register: final_status
      changed_when: false

    - name: Display final cluster status
      debug:
        msg: "{{ final_status.stdout_lines }}"

    - name: Get all pods
      become_user: "{{ ansible_user }}"
      command: kubectl get pods -A
      register: all_pods
      changed_when: false

    - name: Display all pods
      debug:
        msg: "{{ all_pods.stdout_lines }}"
