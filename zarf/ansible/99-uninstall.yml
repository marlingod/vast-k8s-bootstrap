---
# DESTRUCTIVE — uninstalls everything this module installed on the K8s cluster.
# NOT in site.yml. Run explicitly:
#
#   ansible-playbook -i inventory.ini 99-uninstall.yml
#
# Order matters: workloads first (so they don't block ns delete), then namespaces,
# then Zarf itself, then the local-path provisioner (if we installed it), then
# the package dir on the master. Inotify sysctls are LEFT (they are harmless).

- name: Uninstall VAST DataEngine + Zarf from the K8s cluster
  hosts: zarf_controller
  gather_facts: no

  tasks:
    # ── 1. workloads in VAST namespaces ────────────────────────────────
    - name: Delete all deployments + statefulsets + daemonsets in {{ item }}
      ansible.builtin.shell: |
        set -e
        kubectl -n {{ item }} delete deploy --all --ignore-not-found --wait=false 2>&1 | tail -1
        kubectl -n {{ item }} delete sts    --all --ignore-not-found --wait=false 2>&1 | tail -1
        kubectl -n {{ item }} delete ds     --all --ignore-not-found --wait=false 2>&1 | tail -1
        kubectl -n {{ item }} delete job    --all --ignore-not-found --wait=false 2>&1 | tail -1
        kubectl -n {{ item }} delete pvc    --all --ignore-not-found --wait=false 2>&1 | tail -1
        echo done
      loop: "{{ vast_namespaces }}"
      register: ns_workload_delete
      changed_when: "'deleted' in ns_workload_delete.stdout"
      failed_when: false

    # ── 2. Delete CRDs created by the VAST DataEngine zarf package ─────
    - name: Delete VAST CRDs (vasttenants, vastpipelines, vastkafkabrokers)
      ansible.builtin.shell: |
        for crd in vasttenants.vast.vastdata.com \
                   vastpipelines.vast.vastdata.com \
                   vastkafkabrokers.vast.vastdata.com; do
          kubectl delete crd "$crd" --ignore-not-found --wait=false 2>&1 | tail -1
        done
        echo done
      register: vast_crds
      changed_when: "'deleted' in vast_crds.stdout"
      failed_when: false

    # ── 3. Delete the 3 VAST namespaces ────────────────────────────────
    - name: Delete VAST namespaces
      ansible.builtin.command: kubectl delete ns {{ item }} --ignore-not-found --wait=false
      loop: "{{ vast_namespaces }}"
      register: ns_delete
      changed_when: "'deleted' in ns_delete.stdout"
      failed_when: false

    - name: Wait for VAST namespaces to fully drain (up to 2 min each)
      ansible.builtin.command: kubectl wait --for=delete ns/{{ item }} --timeout=120s
      loop: "{{ vast_namespaces }}"
      register: ns_wait
      changed_when: false
      failed_when: false

    # ── 4. zarf destroy — cleans zarf namespace + injector + registry ──
    - name: Detect if zarf is installed
      ansible.builtin.shell: kubectl get ns zarf --ignore-not-found -o name
      register: zarf_ns_check
      changed_when: false

    - name: zarf destroy --confirm
      ansible.builtin.command: zarf destroy --confirm --log-level {{ zarf_log_level | default('info') }}
      when: zarf_ns_check.stdout | length > 0
      register: zarf_destroy_out
      # Allow up to 10 min for zarf to clean up registry + injector
      async: 600
      poll: 15
      changed_when: true
      failed_when: false

    # ── 5. local-path-provisioner (only if we installed it) ────────────
    - name: Detect local-path-storage namespace
      ansible.builtin.shell: kubectl get ns local-path-storage --ignore-not-found -o name
      register: lpp_ns_check
      changed_when: false

    - name: Delete local-path-provisioner namespace
      ansible.builtin.command: kubectl delete ns local-path-storage --ignore-not-found --wait=false
      when:
        - lpp_ns_check.stdout | length > 0
        - storage.provisioner | default('') == 'local-path'
      changed_when: true

    - name: Delete local-path StorageClass
      ansible.builtin.command: kubectl delete sc local-path --ignore-not-found
      when:
        - lpp_ns_check.stdout | length > 0
        - storage.provisioner | default('') == 'local-path'
      changed_when: true
      failed_when: false

    # ── 6. Drop the `default` annotation if we set it on a byo SC ──────
    - name: Unmark byo StorageClass as default (only if we set it)
      ansible.builtin.command: >
        kubectl patch storageclass {{ storage.class_name }}
        -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"false"}}}'
      when: storage.provisioner | default('') == 'byo'
      changed_when: true
      failed_when: false

    # ── 7. Remove the packages dir on the master ───────────────────────
    - name: Delete packages dir on master
      ansible.builtin.file:
        path: "{{ zarf_packages.dir }}"
        state: absent

    # ── 8. Verify ──────────────────────────────────────────────────────
    - name: Verify VAST namespaces are gone
      ansible.builtin.command: kubectl get ns {{ item }}
      loop: "{{ vast_namespaces + ['zarf'] }}"
      register: verify_ns
      changed_when: false
      failed_when:
        - verify_ns.rc == 0
        - "'NotFound' not in verify_ns.stderr"

    - name: Cleanup summary
      ansible.builtin.debug:
        msg:
          - "VAST namespaces deleted: {{ vast_namespaces | join(', ') }}"
          - "zarf destroyed: {{ 'yes' if zarf_ns_check.stdout | length > 0 else 'was not installed' }}"
          - "local-path-storage: {{ 'removed' if (lpp_ns_check.stdout | length > 0 and storage.provisioner | default('') == 'local-path') else 'untouched' }}"
          - "packages dir removed: {{ zarf_packages.dir }}"
