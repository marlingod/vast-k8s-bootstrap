---
# Set inotify limits on every K8s node. The VAST Zarf package (knative + KEDA +
# operator + telemetry collector) blows past the kernel defaults and pods will
# CrashLoopBackOff at startup without this.
#
# Idempotent: writes /etc/sysctl.d/99-vast-inotify.conf and reloads sysctl.

- name: Set inotify limits on K8s nodes
  hosts: k8s_nodes
  become: yes
  gather_facts: no

  tasks:
    - name: Write sysctl drop-in for inotify limits
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-vast-inotify.conf
        mode: '0644'
        content: |
          # Managed by /Users/yemalin.godonou/Documents/vast/kubernetes/zarf
          fs.inotify.max_user_instances = {{ inotify_max_user_instances }}
          fs.inotify.max_user_watches   = {{ inotify_max_user_watches }}
      register: sysctl_dropin

    - name: Reload sysctl (only if file changed)
      ansible.builtin.command: sysctl --system
      when: sysctl_dropin.changed
      changed_when: true

    - name: Verify inotify limits are in effect
      ansible.builtin.shell: |
        set -e
        i=$(sysctl -n fs.inotify.max_user_instances)
        w=$(sysctl -n fs.inotify.max_user_watches)
        [ "$i" -ge {{ inotify_max_user_instances }} ] || { echo "instances=$i < {{ inotify_max_user_instances }}"; exit 1; }
        [ "$w" -ge {{ inotify_max_user_watches }} ]   || { echo "watches=$w < {{ inotify_max_user_watches }}"; exit 1; }
        echo "ok: instances=$i watches=$w"
      register: inotify_check
      changed_when: false

    - name: Show inotify status
      ansible.builtin.debug:
        msg: "{{ inotify_check.stdout }}"
