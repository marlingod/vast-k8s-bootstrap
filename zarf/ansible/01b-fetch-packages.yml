---
# Ensure the two VAST Zarf .tar.zst packages exist on the MASTER node (the
# zarf_controller host) before plays 03/05 need them. All file operations in
# this playbook target the master — the operator's Mac just orchestrates.
#
# Three sources (zarf_packages.source):
#   local    — both .tar.zst files are ALREADY on the master under
#              zarf_packages.dir. Fail fast if either is missing.
#   download — fetch zarf_packages.bundle_url FROM the master into
#              zarf_packages.dir, then extract. Master needs egress to bundle_url.
#   upload   — copy zarf_packages.operator_bundle_path FROM the operator's local
#              machine UP to the master, then extract. Use when the master is
#              air-gapped but the operator can ferry the bundle.
#
# Idempotent: if both .tar.zst files already exist on the master, this playbook
# is a no-op regardless of source.

- name: Fetch + extract VAST Zarf packages on the master
  hosts: zarf_controller            # runs on the master, not the operator
  gather_facts: no

  tasks:
    - name: Validate zarf_packages.source
      ansible.builtin.fail:
        msg: |
          zarf_packages.source={{ zarf_packages.source }} is not supported.
          Choose one of: local, download, upload.
      when: zarf_packages.source not in ['local', 'download', 'upload']

    - name: Ensure packages dir exists on the master
      ansible.builtin.file:
        path: "{{ zarf_packages.dir }}"
        state: directory
        mode: '0755'

    - name: Check (on master) if zarf init package is present
      ansible.builtin.stat:
        path: "{{ zarf_init_package_path }}"
      register: init_pkg

    - name: Check (on master) if zarf DataEngine package is present
      ansible.builtin.stat:
        path: "{{ zarf_dataengine_package_path }}"
      register: de_pkg

    - name: Set "needs fetch" flag
      ansible.builtin.set_fact:
        needs_fetch: "{{ (not init_pkg.stat.exists) or (not de_pkg.stat.exists) }}"

    - name: Skip — both packages already present on the master
      ansible.builtin.debug:
        msg: "Both .tar.zst packages already in {{ zarf_packages.dir }} on the master — skipping fetch."
      when: not needs_fetch

    # ── source=local — fail if missing on master ───────────────────────
    - name: local | fail — required .tar.zst missing on master
      ansible.builtin.fail:
        msg: |
          zarf_packages.source=local but at least one .tar.zst is missing on the master.
          Master path checked: {{ zarf_packages.dir }}
          Missing files:
            init       (present={{ init_pkg.stat.exists }}): {{ zarf_init_package_path }}
            dataengine (present={{ de_pkg.stat.exists }}):   {{ zarf_dataengine_package_path }}
          Either:
            (1) put the .tar.zst files on the master under {{ zarf_packages.dir }}, OR
            (2) set zarf_packages.source=download + zarf_packages.bundle_url=<SE-provided URL>, OR
            (3) set zarf_packages.source=upload + zarf_packages.operator_bundle_path=<path on operator>.
      when:
        - needs_fetch
        - zarf_packages.source == 'local'

    # ── source=download — master fetches outer .tar.gz, extracts ───────
    - name: download | validate bundle_url is set
      ansible.builtin.fail:
        msg: |
          zarf_packages.source=download but zarf_packages.bundle_url is empty.
          Set zarf_packages.bundle_url in group_vars/all.yml to the URL provided
          by VAST SE (e.g. https://files.vastdata.com/vast_dataengine_release_<N>_<pipeline>.tar.gz).
      when:
        - needs_fetch
        - zarf_packages.source == 'download'
        - (zarf_packages.bundle_url | default('') | length) == 0

    - name: download | derive local bundle path (on master)
      ansible.builtin.set_fact:
        bundle_master_path: "{{ zarf_packages.dir }}/{{ zarf_packages.bundle_url | basename }}"
      when:
        - needs_fetch
        - zarf_packages.source == 'download'

    - name: download | check if outer .tar.gz already on master
      ansible.builtin.stat:
        path: "{{ bundle_master_path }}"
      register: bundle_stat_dl
      when:
        - needs_fetch
        - zarf_packages.source == 'download'

    - name: download | master fetches outer bundle from bundle_url
      ansible.builtin.get_url:
        url: "{{ zarf_packages.bundle_url }}"
        dest: "{{ bundle_master_path }}"
        mode: '0644'
        timeout: 600                  # bundle is ~hundreds of MB
      when:
        - needs_fetch
        - zarf_packages.source == 'download'
        - not bundle_stat_dl.stat.exists

    # ── source=upload — two flavors ───────────────────────────────────
    # Detect which: bundle (single .tar.gz) or files (two .tar.zst) ─────
    - name: upload | detect mode (bundle vs files)
      ansible.builtin.set_fact:
        upload_mode: >-
          {{
            'files' if (
                (zarf_packages.operator_init_path | default('') | length) > 0
                and (zarf_packages.operator_dataengine_path | default('') | length) > 0
              )
            else ('bundle' if (zarf_packages.operator_bundle_path | default('') | length) > 0
                  else 'unset')
          }}
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'

    - name: upload | validate operator path(s) set
      ansible.builtin.fail:
        msg: |
          zarf_packages.source=upload but no operator path is set. Provide EITHER:
            (A) zarf_packages.operator_bundle_path (outer .tar.gz on operator),
                — playbook copies + extracts on master, OR
            (B) BOTH zarf_packages.operator_init_path AND zarf_packages.operator_dataengine_path
                (two .tar.zst files on operator) — playbook scp's each directly.
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'unset'

    # ── upload mode=files: scp the two .tar.zst directly ──────────────
    - name: upload/files | copy zarf init .tar.zst from operator → master
      ansible.builtin.copy:
        src: "{{ zarf_packages.operator_init_path }}"
        dest: "{{ zarf_init_package_path }}"
        mode: '0644'
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'files'
        - not init_pkg.stat.exists

    - name: upload/files | copy zarf dataengine .tar.zst from operator → master
      ansible.builtin.copy:
        src: "{{ zarf_packages.operator_dataengine_path }}"
        dest: "{{ zarf_dataengine_package_path }}"
        mode: '0644'
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'files'
        - not de_pkg.stat.exists

    # ── upload mode=bundle: scp outer .tar.gz, then extract ───────────
    - name: upload/bundle | derive bundle path on master
      ansible.builtin.set_fact:
        bundle_master_path: "{{ zarf_packages.dir }}/{{ zarf_packages.operator_bundle_path | basename }}"
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'bundle'

    - name: upload/bundle | check if outer .tar.gz already on master
      ansible.builtin.stat:
        path: "{{ bundle_master_path }}"
      register: bundle_stat_up
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'bundle'

    - name: upload/bundle | copy outer bundle from operator → master
      ansible.builtin.copy:
        src: "{{ zarf_packages.operator_bundle_path }}"
        dest: "{{ bundle_master_path }}"
        mode: '0644'
      when:
        - needs_fetch
        - zarf_packages.source == 'upload'
        - upload_mode == 'bundle'
        - not bundle_stat_up.stat.exists

    # ── extract outer .tar.gz on master (download + upload/bundle converge) ──
    - name: download + upload/bundle | extract outer bundle into packages dir on master
      ansible.builtin.unarchive:
        src: "{{ bundle_master_path }}"
        dest: "{{ zarf_packages.dir }}"
        remote_src: yes               # bundle is already on master at this point
        creates: "{{ zarf_init_package_path }}"
      when:
        - needs_fetch
        - (zarf_packages.source == 'download') or
          (zarf_packages.source == 'upload' and upload_mode == 'bundle')

    # ── final verify (regardless of branch) ────────────────────────────
    - name: Verify zarf init package now present on master
      ansible.builtin.stat:
        path: "{{ zarf_init_package_path }}"
      register: init_pkg_final
      failed_when: not init_pkg_final.stat.exists

    - name: Verify zarf DataEngine package now present on master
      ansible.builtin.stat:
        path: "{{ zarf_dataengine_package_path }}"
      register: de_pkg_final
      failed_when: not de_pkg_final.stat.exists

    - name: Packages ready on master
      ansible.builtin.debug:
        msg:
          - "master:     {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }})"
          - "init:       {{ zarf_init_package_path }} ({{ init_pkg_final.stat.size }} bytes)"
          - "dataengine: {{ zarf_dataengine_package_path }} ({{ de_pkg_final.stat.size }} bytes)"
