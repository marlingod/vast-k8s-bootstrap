[defaults]
inventory = ./inventory/hosts.ini
collections_path = ./collections
roles_path = ./collections/ansible_collections/vast/kubernetes/roles
host_key_checking = False
deprecation_warnings = False
timeout = 30
forks = 10
vault_password_file = ~/.config/vast-kubernetes/vault_pass
stdout_callback = default
callback_result_format = yaml
interpreter_python = /usr/bin/python3
# Fact caching speeds up multi-play runs (site.yml has 9 plays; gather once).
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .cache/facts
fact_caching_timeout = 7200
# Slightly larger callback retry window so transient SSH hiccups self-recover.
retry_files_enabled = False

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True
